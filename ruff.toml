# Ruff configuration — single source of truth for lint scope and rules.
# Policy rationale: docs/ENGINEERING_GUARDRAILS.md. Do not duplicate these
# lists in docs or CI; CI should invoke `ruff check .` against this config.
#
# Ratchet contract (per ENGINEERING_GUARDRAILS "exception" policy):
# - Every per-file entry below is an acknowledged, dated debt, not a grant.
# - Remove entries as their tasks land: DTZ entries with T-TIME-*,
#   S105 entries with T-SEC-*, C901/BLE001 entries as Phase 2 refactors and
#   boundary cleanups shrink the offending functions/handlers.
# - Never widen an entry's code list to silence a NEW violation; fix the code
#   or raise it in the PR per the AGENTS.md objection protocol.
# - Pruned as stale on 2026-07-18 (no longer violating): api/metrics.py,
#   pipeline/backlog_maintenance.py, pipeline/db_session.py,
#   pipeline/nlp_entity_model.py, pipeline/profiling.py,
#   pipeline/summary_backfill.py, pipeline/semantic_index.py,
#   pipeline/task_startup.py, scripts/backfill_summaries.py,
#   scripts/evaluate_soak_week.py, scripts/hydration_repaired_runner.py,
#   scripts/worker_healthcheck.py [BLE001].

target-version = "py314"
line-length = 120
src = ["api", "council_crawler", "pipeline", "scripts", "semantic_service", "tests"]
respect-gitignore = true
extend-exclude = [
    "archive",
    "data",
    "frontend",
    "monitoring",
    "tmp",
]

[lint]
# E722  bare except                    F401/F841  unused imports/locals
# B     bugbear bug patterns           BLE001     blind except Exception
# C901  complexity ceiling (mccabe)    DTZ        naive-datetime usage
# S     bandit security checks (api/pipeline only; see per-file ignores)
select = ["E722", "F401", "F841", "B", "BLE001", "C901", "DTZ", "S"]

[lint.mccabe]
# T-GOV-3 structural rule. Current offenders are allowlisted below and
# ratchet down; do not add new entries without an exception rationale.
max-complexity = 10

[lint.flake8-bugbear]
# FastAPI dependency-injection defaults are intentional call-in-default.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Header", "fastapi.Body"]

[lint.per-file-ignores]
# Blanket scopes: operator scripts skip bandit + unused-symbol hygiene noise;
# tests additionally skip complexity and naive-datetime fixtures.
"scripts/*.py" = ["F401", "F841", "S"]
"tests/*.py" = ["F401", "F841", "B007", "S", "DTZ", "C901"]

