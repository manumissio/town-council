# These opt-in bindings preserve local operator access without exposing
# backing or monitoring services beyond the host loopback interface.
services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  meilisearch:
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      - MEILI_ENV=development

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  prometheus:
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    ports:
      - "127.0.0.1:3001:3000"

  api:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api:/app/api
      - ./pipeline:/app/pipeline
    environment:
      - APP_ENV=dev
      - MEILI_SEARCH_KEY=${MEILI_SEARCH_KEY:-${MEILI_MASTER_KEY:-masterKey}}
      - STARTUP_PURGE_DERIVED=${STARTUP_PURGE_DERIVED:-true}

  semantic:
    volumes:
      - ./pipeline:/app/pipeline
      - ./semantic_service:/app/semantic_service
    environment:
      - APP_ENV=dev
      - MEILI_SEARCH_KEY=${MEILI_SEARCH_KEY:-${MEILI_MASTER_KEY:-masterKey}}

  worker:
    environment:
      - STARTUP_PURGE_DERIVED=${STARTUP_PURGE_DERIVED:-true}

  pipeline:
    environment:
      - STARTUP_PURGE_DERIVED=${STARTUP_PURGE_DERIVED:-true}
