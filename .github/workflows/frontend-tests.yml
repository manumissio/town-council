name: Frontend Tests

on:
  pull_request:
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test
