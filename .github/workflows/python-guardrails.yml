name: Python Guardrails

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".pre-commit-config.yaml"
      - ".github/workflows/python-guardrails.yml"
      - "docs/**"
      - "ops/**"
      - "pipeline/**"
      - "api/**"
      - "scripts/**"
      - "tests/**"
      - "mypy.ini"
      - "ruff.toml"
  push:
    branches: ["master"]
    paths:
      - "AGENTS.md"
      - ".pre-commit-config.yaml"
      - ".github/workflows/python-guardrails.yml"
      - "docs/**"
      - "ops/**"
      - "pipeline/**"
      - "api/**"
      - "scripts/**"
      - "tests/**"
      - "mypy.ini"
      - "ruff.toml"

permissions:
  contents: read

jobs:
  python-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install guardrail and runtime dependencies
        run: |
          python -m pip install -r pipeline/requirements.txt
          python -m pip install -r api/requirements.txt
          python -m pip install -r pipeline/requirements-dev.txt

      - name: Run static guardrails
        run: python -m ruff check api pipeline scripts tests

      - name: Run scoped formatter guardrail
        run: python -m ruff format --check api/metrics.py api/search/query_builder.py pipeline/config.py pipeline/config_env.py pipeline/config_startup.py pipeline/config_inference.py pipeline/config_semantic.py pipeline/config_processing.py pipeline/config_topic_similarity.py pipeline/config_table.py pipeline/agenda_crosscheck.py pipeline/agenda_legistar.py pipeline/agenda_resolver.py pipeline/agenda_resolver_contracts.py pipeline/agenda_resolver_quality.py pipeline/agenda_resolver_legistar_policy.py pipeline/agenda_resolver_html.py pipeline/agenda_resolver_enrichment.py pipeline/agenda_resolver_runner.py pipeline/city_scope.py pipeline/content_hash.py pipeline/document_kinds.py pipeline/agenda_service.py pipeline/agenda_verification_model_access.py pipeline/extraction_service.py pipeline/extraction_state.py pipeline/maintenance_run_status.py pipeline/models.py pipeline/profiling.py pipeline/rollout_registry.py pipeline/runtime_guardrails.py pipeline/summary_hydration_diagnostics.py pipeline/summary_hydration_diagnostic_contracts.py pipeline/summary_hydration_diagnostic_policy.py pipeline/summary_hydration_diagnostic_queries.py pipeline/summary_hydration_diagnostic_builder.py pipeline/profile_manifest.py pipeline/profile_manifest_contracts.py pipeline/profile_manifest_io.py pipeline/profile_manifest_candidates.py pipeline/profile_manifest_people.py pipeline/profile_manifest_builder.py pipeline/profile_manifest_preconditioning.py pipeline/topic_generation.py pipeline/topic_generation_contracts.py pipeline/topic_generation_text.py pipeline/topic_generation_keywords.py pipeline/topic_generation_task.py pipeline/topic_generation_batch.py pipeline/summary_quality.py pipeline/summary_freshness.py pipeline/utils.py pipeline/verification_service.py pipeline/vote_extractor.py pipeline/vote_extraction_contracts.py pipeline/vote_extraction_prompting.py pipeline/vote_extraction_parser.py pipeline/vote_extraction_context.py pipeline/vote_extraction_policy.py pipeline/vote_extraction_runner.py scripts/analyze_pipeline_profile.py

      - name: Run typed subtree checks
        run: python -m mypy

      - name: Run guardrail tests
        run: |
          PYTHONPATH=. python -m pytest -q tests/test_repository_guardrails.py
          PYTHONPATH=. python -m pytest -q tests/test_config_cleanup.py
          PYTHONPATH=. python -m pytest -q tests/test_pipeline_import_side_effects.py
          PYTHONPATH=. python -m pytest -q tests/test_provider_error_mapping_retry_vs_fallback.py
          PYTHONPATH=. python -m pytest -q tests/test_summary_staleness.py
          PYTHONPATH=. python -m pytest -q tests/test_pipeline_profile_report.py
          PYTHONPATH=. python -m pytest -q tests/test_docs_links.py
